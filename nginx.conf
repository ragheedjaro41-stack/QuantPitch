# Serves the built SPA and supports client-side routing (React Router).
server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # gzip static assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Long-cache fingerprinted build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: deep links (e.g. /match/123) serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache the HTML shell so new deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Lightweight liveness endpoint for container healthchecks.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
